name: Bug report
description: Something in Zotero Triage doesn't work as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the fields
        below so the issue can be reproduced.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before reporting
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I'm on Zotero 7.0 or newer.
          required: true
  - type: input
    id: plugin-version
    attributes:
      label: Zotero Triage version
      description: See Tools → Plugins, or the `.xpi` filename you installed.
      placeholder: "0.0.1"
    validations:
      required: true
  - type: input
    id: zotero-version
    attributes:
      label: Zotero version
      description: See Zotero → About Zotero.
      placeholder: "7.0.x"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do, step by step?
      placeholder: |
        1. Right-click an item …
        2. Choose Zotero Triage → …
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include any error from the Zotero debug output (Help → Debug Output Logging) if relevant.
    validations:
      required: true
