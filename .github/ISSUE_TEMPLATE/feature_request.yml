name: Feature request
description: Suggest an idea or improvement for Zotero Triage.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Note the project's scope: a sortable,
        fully local reading-priority column. It deliberately does **not** aim to
        replace systematic-review tools (ASReview, Rayyan) — see the README.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before requesting
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: This fits the project's scope (a priority column), not systematic review.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
